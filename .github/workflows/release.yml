name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    uses: ./.github/workflows/ci.yml

  release:
    name: Publish GitHub release
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches package version
        shell: python
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          import os
          import tomllib
          from pathlib import Path
          version = tomllib.loads(Path('pyproject.toml').read_text())['project']['version']
          expected = f'v{version}'
          if os.environ['RELEASE_TAG'] != expected:
              raise SystemExit(f"Tag {os.environ['RELEASE_TAG']} does not match {expected}")
      - uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist
      - name: Create GitHub release after validation passes
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes --verify-tag
