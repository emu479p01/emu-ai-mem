name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    env:
      EMU_MEM_DISABLE_EMBEDDINGS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest --cov=emu_ai_mem --cov-report=term-missing
      - run: python -m ruff check .
      - if: matrix.python-version == '3.11'
        run: python -m mypy src/emu_ai_mem
      - run: python -m build

  plugin-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate JSON and skill frontmatter
        shell: python
        run: |
          import json
          from pathlib import Path
          for path in Path('.').rglob('*.json'):
              json.loads(path.read_text(encoding='utf-8'))
          for path in Path('.').rglob('SKILL.md'):
              text = path.read_text(encoding='utf-8')
              assert text.startswith('---\n')
              assert '\nname:' in text and '\ndescription:' in text
          print('Plugin JSON and skill metadata are valid')
