services:
  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      - gateway-data:/data
    expose:
      - "8000"
  caddy:
    image: caddy:2.10-alpine
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      GATEWAY_DOMAIN: ${GATEWAY_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
volumes:
  gateway-data:
  caddy-data:
  caddy-config:
